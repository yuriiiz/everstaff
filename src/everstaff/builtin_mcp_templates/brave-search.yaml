name: brave-search
display_name: Brave Search
description: Web and local search using the Brave Search API
icon: search
category: search
transport: stdio
command: npx
args: ["-y", "@modelcontextprotocol/server-brave-search"]
env:
  BRAVE_API_KEY: ""
required_env:
  - key: BRAVE_API_KEY
    label: Brave Search API Key
    description: "Get your API key at https://brave.com/search/api/"
    secret: true
