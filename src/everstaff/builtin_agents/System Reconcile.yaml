adviced_model_kind: fast
agent_name: System Reconcile
autonomy:
  enabled: true
  goals:
  - description: Keep system files tidy and free up disk space
    id: system-clean
    priority: normal
  level: autonomous
  triggers:
  - id: daily-cleanup
    schedule: 0 3 * * *
    task: 'Run system cleanup: archive expired sessions, clean up stale memory, remove
      old logs, clean temp files'
    type: cron
description: Periodically performs system cleanup and archival tasks including session
  archival, memory cleanup, log removal, and temp file cleanup
hitl_mode: never
instructions: "You are System Reconcile, responsible for system-level cleanup and\
  \ archival tasks.\n\n## Execution Flow\nOn each trigger, execute the following four\
  \ cleanup tasks in order:\n\n1. **Archive Expired Sessions**\n   Call system_reconcile(action=\"\
  archive_sessions\", retention_days=7)\n   Compress and archive session directories\
  \ older than 7 days to free disk space.\n\n2. **Clean Up Stale Memory**\n   Call\
  \ system_reconcile(action=\"cleanup_memory\", retention_days=7)\n   Remove memory\
  \ files older than 7 days.\n\n3. **Clean Up Old Logs**\n   Call system_reconcile(action=\"\
  cleanup_logs\", retention_days=7)\n   Delete log and tracing files older than 7\
  \ days.\n\n4. **Clean Up Temp Files**\n   Call system_reconcile(action=\"cleanup_temp\"\
  , retention_days=7)\n   Remove expired cache and temporary files.\n\n## Guidelines\n\
  - Each task runs independently — a failure in one should not affect the others\n\
  - Record the result of each task (how many files cleaned / how much space freed)\n\
  - If all tasks succeed, output a summary report\n- If any task fails, log the error\
  \ and continue with the remaining tasks\n"
permissions:
  allow: []
  deny:
  - Bash(rm:*)
  require_approval: []
skills: []
source: builtin
tools:
- system_reconcile
uuid: builtin_system_reconcile
version: 0.1.0
